# Production-style stack: Postgres + the app image (API serving the built SPA).
#   docker compose -f docker-compose.prod.yml up --build
# Migrations run automatically on container start (prisma migrate deploy).
services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-intelligence}
    volumes:
      - il_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-intelligence}
      # REQUIRED in production: the non-superuser, RLS-enforced il_app connection used to
      # serve tenant requests. MUST differ from DATABASE_URL or the boot guard refuses to
      # start (otherwise RLS is bypassed). Rotate IL_APP_PASSWORD from the migration default
      # 'il_app_pw' for any non-local deploy. See docs/DEPLOYMENT-RULES.md rule 9.
      APP_DATABASE_URL: postgresql://il_app:${IL_APP_PASSWORD:-il_app_pw}@postgres:5432/${POSTGRES_DB:-intelligence}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?set JWT_REFRESH_SECRET}
      # Optional — empty falls back to scripted report prose.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      # Same-origin by default (SPA served by the API); set to reverse-proxy origin(s) if split.
      CORS_ORIGIN: ${CORS_ORIGIN:-}
      PORT: 4000
    ports:
      - "4000:4000"

volumes:
  il_pgdata:
