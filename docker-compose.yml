# Local Postgres for development. In this managed session we run Postgres
# directly instead (docker daemon is unavailable), but this is what you run
# on your own machine: `docker compose up -d`.
services:
  postgres:
    image: postgres:16
    container_name: il_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: intelligence
    ports:
      - "5432:5432"
    volumes:
      - il_pgdata:/var/lib/postgresql/data
      - ./docker/initdb:/docker-entrypoint-initdb.d:ro

  adminer:
    image: adminer
    container_name: il_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - postgres

volumes:
  il_pgdata:
